services:
  postgresql:
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
      POSTGRES_USER: ${POSTGRES_USER:-temporal}
    image: postgres:${POSTGRESQL_VERSION:-16}
    ports:
      - ${POSTGRES_DEFAULT_PORT:-5434}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-temporal} -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  temporal:
    container_name: temporal
    depends_on:
      - postgresql
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.27.2}
    ports:
      - 7233:7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.27.2-tctl-1.18.2-cli-1.3.0}
    stdin_open: true
    tty: true
    restart: unless-stopped

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - TEMPORAL_UI_PORT=${TEMPORAL_UI_PORT:-8002}
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.34.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TEMPORAL_UI_PORT:-8002}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    ports:
      - "${TEMPORAL_UI_PORT:-8002}:${TEMPORAL_UI_PORT:-8002}"

  # Temporal Worker
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: awa-worker
    env_file: .env
    environment:
      - TEMPORAL_SERVER_HOST=temporal
      - TEMPORAL_SERVER_PORT=7233
    volumes:
      - ./request.json:/app/request.json
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    depends_on:
      - temporal
    restart: unless-stopped
    entrypoint: ["./docker-entrypoint-worker.sh"]

  # FastAPI Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: awa-api
    env_file: .env
    ports:
      - "${AWA_API_PORT:-8001}:${AWA_API_PORT:-8001}"
    environment:
      - AWA_API_HOST=0.0.0.0
      - TEMPORAL_SERVER_HOST=temporal
      - TEMPORAL_SERVER_PORT=${AWA_API_PORT:-8001}
      - HOME_DIR:${HOME}
      - ENV_PATH:/app/config/.env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./output:/app/output
      - $HOME:${HOME_DIR}
      - $HOME/.aws:/home/awa/.aws:ro
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:${AWA_API_PORT:-8001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Astro UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        PUBLIC_AUTH_MODE: ${PUBLIC_AUTH_MODE:-none}
        PUBLIC_DOCS_ONLY: ${PUBLIC_DOCS_ONLY:-false}
        PUBLIC_AUTH_TRUST_HOST: ${PUBLIC_AUTH_TRUST_HOST:-true}
    container_name: awa-ui
    env_file: .env
    ports:
      - "${AWA_UI_PORT:-8000}:${AWA_UI_PORT:-8000}"
    environment:
      - AWA_UI_HOST=0.0.0.0
      - AWA_UI_PORT=${AWA_UI_PORT:-8000}
      - PUBLIC_AUTH_MODE=${PUBLIC_AUTH_MODE:-none}
      - PUBLIC_DOCS_ONLY=${PUBLIC_DOCS_ONLY:-false}
      - PUBLIC_AUTH_TRUST_HOST=${PUBLIC_AUTH_TRUST_HOST:-true}
      - AUTH_COGNITO_CLIENT_ID=${AUTH_COGNITO_CLIENT_ID}
      - AUTH_COGNITO_CLIENT_SECRET=${AUTH_COGNITO_CLIENT_SECRET}
      - AUTH_COGNITO_ISSUER=${AUTH_COGNITO_ISSUER}
      - AUTH_SECRET=${AUTH_SECRET:-"default_secret_change_in_production"}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${AWA_UI_PORT:-8000}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
