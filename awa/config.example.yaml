#------------------------------#
#           Logging            #
#------------------------------#
# Logging configuration - can be a single level or component-specific
# Option 1: Single log level for all components
# logging:
#   log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

# Option 2: Component-specific log levels
# logging:
#   log_level:
#     api: "INFO"
#     ui: "ERROR"
#     worker: "DEBUG"
#     server: "WARNING"
#     workflow: "INFO"
#     activity: "INFO"
#     cli: "INFO"
#     client: "INFO"
#     script: "INFO"
#     auth: "WARNING"
#     http: "WARNING"
#     socketio: "DEBUG"  # Controls both SOCKETIO-SERVER and SOCKETIO-CLIENT
#     engine: "INFO"    # Note: engine logs use server level
#     uvicorn: "INFO"   # Controls uvicorn and FastAPI logs
# Option 3: Mixed configuration (specify some components, others use default)
# logging:
#   log_level:
#     api: "DEBUG"      # Debug API issues
#     workflow: "INFO"  # Normal workflow logging
#     http: "ERROR"     # Only show HTTP errors
#     # Other components will use INFO (default)

#------------------------------#
#        S3 Vector Store       #
#------------------------------#
# Configuration for AWS S3 Vector Store (optional)
# s3_vector:
#   enabled: true
#   region_name: "us-west-2"
#   vector_bucket_name: "your-vector-bucket"
#   vector_bucket_arn: "arn:aws:s3:::your-vector-bucket"  # Optional
#   index_name: "awa-vectors"
#   distance_metric: "cosine"  # or "euclidean"
#   embedding_source: "azure_openai"  # "openai", "azure_openai", or "tfidf"
