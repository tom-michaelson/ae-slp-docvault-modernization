[pytest]
minversion = 6.0
addopts = -ra -q
testpaths =
    tests
pythonpath = . sdk_dist/python
asyncio_mode = auto
cache_dir = ./.cache/pytest

# Timeout for each test -- increased to account for API delays and response times
# Individual tests might need extra time due to inter-test delays and API processing
timeout = 30

# Custom markers
markers =
    performance: marks tests as performance tests (slow)
